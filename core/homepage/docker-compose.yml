services:
  homepage:
    image: ghcr.io/gethomepage/homepage:latest
    container_name: homepage
    ports:
      - 3005:3000
    volumes:
      - ./config:/app/config # Make sure your local config directory exists
      - ./icons:/app/public/icons # Local bookmark/service icons (use /icons/filename.png)
      - ./images:/app/public/images # Local images
      - /var/run/docker.sock:/var/run/docker.sock:ro # (optional) For docker integrations
      - /mnt/data:/mnt/data:ro
    environment:
      HOMEPAGE_ALLOWED_HOSTS: homepage.home,192.168.1.50:3005 # required, may need port. See gethomepage.dev/installation/#homepage_allowed_hosts
    restart: unless-stopped
