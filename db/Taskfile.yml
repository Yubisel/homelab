version: '3'

includes:
  postgres:
    taskfile: ./postgres
    dir: ./postgres
  redis:
    taskfile: ./redis
    dir: ./redis
  mongodb:
    taskfile: ./mongodb
    dir: ./mongodb
  mysql:
    taskfile: ./mysql
    dir: ./mysql

tasks:
  postgres:
    desc: Start postgres containers
    cmds:
      - task: postgres:postgres

  redis:
    desc: Start redis containers
    cmds:
      - task: redis:redis

  mongodb:
    desc: Start mongodb containers
    cmds:
      - task: mongodb:mongodb

  mysql:
    desc: Start mysql containers
    cmds:
      - task: mysql:mysql

  up:
    desc: Start all enabled database containers
    cmds:
      - '[ ! -f postgres/.enabled ] || task postgres:up'
      - '[ ! -f redis/.enabled ] || task redis:up'
      - '[ ! -f mongodb/.enabled ] || task mongodb:up'
      - '[ ! -f mysql/.enabled ] || task mysql:up'

  down:
    desc: Stop all enabled database containers
    cmds:
      - '[ ! -f postgres/.enabled ] || task postgres:down'
      - '[ ! -f redis/.enabled ] || task redis:down'
      - '[ ! -f mongodb/.enabled ] || task mongodb:down'
      - '[ ! -f mysql/.enabled ] || task mysql:down'

  enable:
    desc: 'Enable a database service. Usage: task db:enable -- postgres'
    cmds:
      - touch {{.CLI_ARGS}}/.enabled
      - echo "Enabled {{.CLI_ARGS}}"

  disable:
    desc: 'Disable a database service. Usage: task db:disable -- postgres'
    cmds:
      - rm -f {{.CLI_ARGS}}/.enabled
      - echo "Disabled {{.CLI_ARGS}}"

  ps:
    desc: Show status of all database containers
    cmds:
      - task: postgres:ps
      - task: redis:ps
      - task: mongodb:ps
      - task: mysql:ps

  pull:
    desc: Pull latest images for all database services
    cmds:
      - task: postgres:pull
      - task: redis:pull
      - task: mongodb:pull
      - task: mysql:pull
