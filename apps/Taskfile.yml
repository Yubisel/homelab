version: '3'

includes:
  booklore:
    taskfile: ./booklore
    dir: ./booklore
  immich:
    taskfile: ./immich
    dir: ./immich
  vikunja:
    taskfile: ./vikunja
    dir: ./vikunja
  hoppscotch:
    taskfile: ./hoppscotch
    dir: ./hoppscotch
  bentopdf:
    taskfile: ./bentopdf
    dir: ./bentopdf
  affine:
    taskfile: ./affine
    dir: ./affine
  n8n:
    taskfile: ./n8n
    dir: ./n8n
  whodb:
    taskfile: ./whodb
    dir: ./whodb
  komga:
    taskfile: ./komga
    dir: ./komga
  ollama:
    taskfile: ./ollama
    dir: ./ollama
  it-tools:
    taskfile: ./it-tools
    dir: ./it-tools
  linkding:
    taskfile: ./linkding
    dir: ./linkding
  tududi:
    taskfile: ./tududi
    dir: ./tududi
  wallos:
    taskfile: ./wallos
    dir: ./wallos
  mailpit:
    taskfile: ./mailpit
    dir: ./mailpit

tasks:
  booklore:
    desc: Start booklore containers
    cmds:
      - task: booklore:booklore

  immich:
    desc: Start immich containers
    cmds:
      - task: immich:immich

  vikunja:
    desc: Start vikunja containers
    cmds:
      - task: vikunja:vikunja

  hoppscotch:
    desc: Start hoppscotch containers
    cmds:
      - task: hoppscotch:hoppscotch

  bentopdf:
    desc: Start bentopdf containers
    cmds:
      - task: bentopdf:bentopdf

  affine:
    desc: Start affine containers
    cmds:
      - task: affine:affine

  n8n:
    desc: Start n8n containers
    cmds:
      - task: n8n:n8n

  whodb:
    desc: Start whodb containers
    cmds:
      - task: whodb:whodb

  komga:
    desc: Start komga containers
    cmds:
      - task: komga:komga

  ollama:
    desc: Start ollama containers
    cmds:
      - task: ollama:ollama

  it-tools:
    desc: Start it-tools containers
    cmds:
      - task: it-tools:it-tools

  linkding:
    desc: Start linkding containers
    cmds:
      - task: linkding:linkding

  tududi:
    desc: Start tududi containers
    cmds:
      - task: tududi:tududi

  wallos:
    desc: Start wallos containers
    cmds:
      - task: wallos:wallos

  mailpit:
    desc: Start mailpit containers
    cmds:
      - task: mailpit:mailpit

  up:
    desc: Start all enabled app containers
    cmds:
      - '[ ! -f booklore/.enabled ] || task booklore:up'
      - '[ ! -f immich/.enabled ] || task immich:up'
      - '[ ! -f vikunja/.enabled ] || task vikunja:up'
      - '[ ! -f hoppscotch/.enabled ] || task hoppscotch:up'
      - '[ ! -f bentopdf/.enabled ] || task bentopdf:up'
      - '[ ! -f affine/.enabled ] || task affine:up'
      - '[ ! -f n8n/.enabled ] || task n8n:up'
      - '[ ! -f whodb/.enabled ] || task whodb:up'
      - '[ ! -f komga/.enabled ] || task komga:up'
      - '[ ! -f ollama/.enabled ] || task ollama:up'
      - '[ ! -f it-tools/.enabled ] || task it-tools:up'
      - '[ ! -f linkding/.enabled ] || task linkding:up'
      - '[ ! -f wallos/.enabled ] || task wallos:up'
      - '[ ! -f tududi/.enabled ] || task tududi:up'
      - '[ ! -f mailpit/.enabled ] || task mailpit:up'

  down:
    desc: Stop all enabled app containers
    cmds:
      - '[ ! -f booklore/.enabled ] || task booklore:down'
      - '[ ! -f immich/.enabled ] || task immich:down'
      - '[ ! -f vikunja/.enabled ] || task vikunja:down'
      - '[ ! -f hoppscotch/.enabled ] || task hoppscotch:down'
      - '[ ! -f bentopdf/.enabled ] || task bentopdf:down'
      - '[ ! -f affine/.enabled ] || task affine:down'
      - '[ ! -f n8n/.enabled ] || task n8n:down'
      - '[ ! -f whodb/.enabled ] || task whodb:down'
      - '[ ! -f komga/.enabled ] || task komga:down'
      - '[ ! -f ollama/.enabled ] || task ollama:down'
      - '[ ! -f it-tools/.enabled ] || task it-tools:down'
      - '[ ! -f linkding/.enabled ] || task linkding:down'
      - '[ ! -f wallos/.enabled ] || task wallos:down'
      - '[ ! -f tududi/.enabled ] || task tududi:down'
      - '[ ! -f mailpit/.enabled ] || task mailpit:down'

  enable:
    desc: "Enable an app service. Usage: task apps:enable -- immich"
    cmds:
      - touch {{.CLI_ARGS}}/.enabled
      - echo "Enabled {{.CLI_ARGS}}"

  disable:
    desc: "Disable an app service. Usage: task apps:disable -- immich"
    cmds:
      - rm -f {{.CLI_ARGS}}/.enabled
      - echo "Disabled {{.CLI_ARGS}}"

  ps:
    desc: Show status of all app containers
    cmds:
      - task: booklore:ps
      - task: immich:ps
      - task: vikunja:ps
      - task: hoppscotch:ps
      - task: bentopdf:ps
      - task: affine:ps
      - task: n8n:ps
      - task: whodb:ps
      - task: komga:ps
      - task: ollama:ps
      - task: it-tools:ps
      - task: linkding:ps
      - task: tududi:ps
      - task: wallos:ps
      - task: mailpit:ps

  pull:
    desc: Pull latest images for all app services
    cmds:
      - task: booklore:pull
      - task: immich:pull
      - task: vikunja:pull
      - task: hoppscotch:pull
      - task: bentopdf:pull
      - task: affine:pull
      - task: n8n:pull
      - task: whodb:pull
      - task: komga:pull
      - task: ollama:pull
      - task: it-tools:pull
      - task: linkding:pull
      - task: tududi:pull
      - task: wallos:pull
      - task: mailpit:pull
