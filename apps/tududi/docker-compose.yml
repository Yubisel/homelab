services:
  tududi:
    image: chrisvel/tududi:latest
    container_name: tududi
    env_file:
      - .env
    environment:
      NODE_ENV: production
      TUDUDI_TRUST_PROXY: "true"
      TUDUDI_UPLOAD_PATH: /app/backend/uploads
    volumes:
      - ./db:/app/backend/db
      - ./uploads:/app/backend/uploads
    ports:
      - "${TUDUDI_HOST_PORT:-3002}:3002"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3002/api/health"]
      interval: 60s
      timeout: 5s
      start_period: 15s
      retries: 3
    networks:
      - proxy-net

networks:
  proxy-net:
    external: true
